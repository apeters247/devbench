# =============================================================================
# Nginx config snippet for Devbench — toxscreen.ai
#
# PLACEMENT: Insert this block BEFORE the existing catch-all location (usually
# `location / { ... }` or `try_files $uri $uri/` block) in the toxscreen.ai
# server block.  If your config uses included snippets, put this before the
# line that includes the catch-all snippet.
#
# Example insertion point in your toxscreen.ai config:
#
#   server {
#       listen 443 ssl;
#       server_name toxscreen.ai www.toxscreen.ai;
#
#       ... ssl_certificate, other locations ...
#
#       # >>> PASTE THE BLOCK BELOW HERE <<<
#
#       # Catch-all — serves the main site
#       location / {
#           ...
#       }
#   }
#
# Order matters: nginx matches prefix locations by longest matching prefix,
# so /tools/devbench/ must be defined before a shorter prefix like / would
# swallow it.
# =============================================================================

# Devbench dashboard — served at /tools/devbench/
location /tools/devbench/ {
    alias /var/www/devbench/web/;

    # Try the requested file; fall back to index.html (for SPAs or direct
    # landing-page routing).
    try_files $uri $uri/ /tools/devbench/index.html;

    # Cache-Control headers
    #   - HTML: no-cache so clients check for freshness every time
    #   - Static assets: 1-year immutable (fingerprinted builds)
    location ~ ^/tools/devbench/.+\.(?:css|js|woff2?|ttf|eot|svg|png|jpg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else under /tools/devbench/ (HTML, JSON, etc.)
    expires    0;
    add_header Cache-Control "no-cache, must-revalidate";

    # Security headers (mirror the main site's policy)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}