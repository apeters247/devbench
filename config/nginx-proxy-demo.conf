# =============================================================================
# Nginx proxy config — ConfigForge Web Demo
# =============================================================================
# Proxies /tools/devbench/demo/* to the ConfigForge serve.py running on
# localhost:8080 (or a different port).  This lets users use the interactive
# config converter demo without exposing the Python server directly.
#
# PLACEMENT: Insert this block BEFORE the existing catch-all location in the
# naxiai.com server block of your nginx config.
#
# PREREQUISITES:
#   1. The Python web demo must be running:
#        python3 -m core.cli cf --serve --port 8080
#      Or as a systemd service (see forge/api-docs.md).
#   2. Nginx must have the `proxy_pass` module enabled (it's on by default).
#
# USAGE:
#   1. Copy this file into your naxiai.com nginx config (e.g. as a snippet).
#   2. Reload nginx:
#        sudo nginx -t && sudo systemctl reload nginx
#   3. Verify:
#        curl -sI https://naxiai.com/tools/devbench/demo/ | head -5
#
# =============================================================================

# ConfigForge web demo — interactive config converter
location /tools/devbench/demo/ {
    proxy_pass http://127.0.0.1:8080/demo/;

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # WebSocket support (reserved for future use)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # CORS headers (mirrored from the upstream server)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# ConfigForge REST API — programmatic config conversion
location /tools/devbench/api/ {
    proxy_pass http://127.0.0.1:8081/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;

    proxy_buffering off;

    # CORS
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
}