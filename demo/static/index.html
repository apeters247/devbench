<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ConfigForge — Config Converter Demo</title>
<meta name="description" content="Convert config files between YAML, JSON, TOML, XML, CSV, INI, and .env — instantly, offline, no data leaves your machine.">
<meta name="keywords" content="config converter, yaml to json, json to toml, ini to toml, offline converter, devbench, configforge">
<meta property="og:title" content="ConfigForge — Config Converter Demo">
<meta property="og:description" content="Free offline config file converter. Paste, detect, convert. No signup, no data upload.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="robots" content="index, follow">
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --border: #2a2e3c;
    --text: #e6e8ef;
    --muted: #8b90a1;
    --accent: #5b8cff;
    --accent-hover: #4a7bf0;
    --ok: #3ecf8e;
    --err: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { font-size: 20px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 420px;
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .panel-head label { font-size: 13px; color: var(--muted); font-weight: 600; }
  textarea {
    flex: 1;
    width: 100%;
    resize: vertical;
    background: #11131b;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: "SF Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 320px;
    tab-size: 2;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea[readonly] { background: #0d0f16; }
  .badge {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 20px;
    background: #232735;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .badge.detected { color: var(--ok); border-color: rgba(62,207,142,.4); }
  select {
    background: #11131b;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
  }
  select:focus { outline: none; border-color: var(--accent); }
  .controls {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: -4px;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    transition: background .15s ease;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-ghost { background: #232735; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background: #2c3142; }
  .status { font-size: 13px; min-height: 18px; }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }
  .field { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 16px; }
  .info-bar { max-width: 1200px; margin: 0 auto; padding: 0 24px 12px; font-size: 13px; color: var(--muted); display: flex; gap: 24px; flex-wrap: wrap; }
  .info-bar a { color: var(--accent); text-decoration: none; }
  .info-bar a:hover { text-decoration: underline; }
  .info-bar .api-badge { background: #1a1d27; border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>ConfigForge</h1>
  <span class="sub">Paste a config, pick a target format, convert. Runs locally.</span>
</header>

<div class="info-bar">
  <span>⚡ 100% local — no data leaves your machine</span>
  <span>🔧 Supports: JSON · YAML · TOML · XML · CSV · INI · ENV</span>
  <span><a href="https://naxiai.com/tools/devbench/">← Back to Devbench</a></span>
  <span class="api-badge"><a href="/api/v1/formats">REST API available</a></span>
</div>

<main>
  <section class="panel">
    <div class="panel-head">
      <label for="input">Input</label>
      <span id="detected" class="badge">format: —</span>
    </div>
    <textarea id="input" placeholder="Paste JSON, YAML, TOML, XML, CSV, INI, or .env here…" spellcheck="false"></textarea>
  </section>

  <section class="panel">
    <div class="panel-head">
      <label for="output">Output</label>
      <button id="copy" class="btn-ghost" style="padding:4px 12px;font-size:12px;">Copy</button>
    </div>
    <textarea id="output" readonly placeholder="Converted output appears here…" spellcheck="false"></textarea>
  </section>

  <div class="controls">
    <div class="field">
      <span>Convert to</span>
      <select id="format">
        <option value="json">JSON</option>
        <option value="yaml">YAML</option>
        <option value="toml">TOML</option>
        <option value="xml">XML</option>
        <option value="csv">CSV</option>
        <option value="ini">INI</option>
        <option value="env">ENV</option>
      </select>
    </div>
    <button id="convert" class="btn-primary">Convert</button>
    <button id="swap" class="btn-ghost">Swap</button>
    <span id="status" class="status"></span>
  </div>
</main>

<footer>ConfigForge · stdlib only · no data leaves your machine · <a href="https://github.com/apeters247/devbench" style="color:var(--accent);">GitHub</a></footer>

<script>
(function () {
  "use strict";
  var input = document.getElementById("input");
  var output = document.getElementById("output");
  var format = document.getElementById("format");
  var detected = document.getElementById("detected");
  var statusEl = document.getElementById("status");
  var convertBtn = document.getElementById("convert");
  var copyBtn = document.getElementById("copy");
  var swapBtn = document.getElementById("swap");
  var detectTimer = null;

  function setStatus(msg, cls) {
    statusEl.textContent = msg || "";
    statusEl.className = "status" + (cls ? " " + cls : "");
  }

  function setDetected(fmt) {
    if (fmt && fmt !== "unknown") {
      detected.textContent = "format: " + fmt;
      detected.className = "badge detected";
    } else {
      detected.textContent = "format: —";
      detected.className = "badge";
    }
  }

  function post(path, body) {
    return fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    }).then(function (r) { return r.json(); });
  }

  function detect() {
    var text = input.value;
    if (!text.trim()) { setDetected(null); return; }
    post("/detect", { source: text })
      .then(function (d) { setDetected(d.format); })
      .catch(function () { setDetected(null); });
  }

  function scheduleDetect() {
    if (detectTimer) clearTimeout(detectTimer);
    detectTimer = setTimeout(detect, 250);
  }

  function convert() {
    var text = input.value;
    if (!text.trim()) { setStatus("Nothing to convert — paste a config first.", "err"); return; }
    convertBtn.disabled = true;
    setStatus("Converting…");
    post("/convert", { source: text, to_format: format.value, from_format: "auto" })
      .then(function (d) {
        if (d.success) {
          output.value = d.output;
          setDetected(d.input_format);
          setStatus(d.input_format + " → " + d.output_format + " ✓", "ok");
        } else {
          output.value = "";
          setStatus("Error: " + (d.error || "conversion failed"), "err");
        }
      })
      .catch(function (e) { setStatus("Request failed: " + e, "err"); })
      .finally(function () { convertBtn.disabled = false; });
  }

  function copyOutput() {
    if (!output.value) { setStatus("Nothing to copy.", "err"); return; }
    var done = function () {
      var orig = copyBtn.textContent;
      copyBtn.textContent = "Copied!";
      setTimeout(function () { copyBtn.textContent = orig; }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(output.value).then(done, function () {
        output.select(); document.execCommand("copy"); done();
      });
    } else {
      output.select(); document.execCommand("copy"); done();
    }
  }

  function swap() {
    if (!output.value && !input.value) { setStatus("Nothing to swap.", "err"); return; }
    var prevIn = input.value;
    var prevOut = output.value;
    input.value = prevOut;
    output.value = prevIn;
    setStatus("");
    detect();
  }

  input.addEventListener("paste", function () { setTimeout(detect, 0); });
  input.addEventListener("input", scheduleDetect);
  convertBtn.addEventListener("click", convert);
  copyBtn.addEventListener("click", copyOutput);
  swapBtn.addEventListener("click", swap);
})();
</script>
</body>
</html>
