name: macOS

# Builds the SwiftUI menu-bar app + verifies the Python bridge contract.
# Runs on macOS 14 runners (Apple Silicon) so we get native arm64 builds.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    name: Swift build (macOS 14)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Build Devbench app
        working-directory: ui
        run: swift build -v

      - name: Build release binary
        working-directory: ui
        run: swift build -c release -v

      - name: Prepare .app bundle
        run: |
          mkdir -p build
          cp -R ui/.build/release/Devbench build/Devbench.app 2>/dev/null || \
            cp -R ui/.build/release/Devbench build/ 2>/dev/null || \
            echo "No .app bundle found — check swift build output"

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Devbench-macOS
          path: build/
          retention-days: 30

  python-contract:
    name: Python bridge contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install devbench (editable) + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Verify devbench CLI is on PATH
        run: devbench --version

      - name: Run bridge contract tests
        run: python -m pytest tests/test_swift_bridge_contract.py -q

      - name: Run full test suite
        run: python -m pytest tests/ -q --tb=line