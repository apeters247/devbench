name: macOS

# Builds the SwiftUI menu-bar app and verifies the Python <-> Swift bridge
# contract, so the CLI envelope and the Swift app can never silently drift apart.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    name: Swift build (macOS 14)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Build Devbench app
        working-directory: ui
        run: swift build -v

  python-contract:
    name: Python bridge contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install devbench (editable) + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Verify devbench CLI is on PATH
        run: devbench --version

      - name: Run bridge contract tests
        run: python -m pytest tests/test_swift_bridge_contract.py -q

      - name: Run full test suite
        run: python -m pytest tests/ -q --tb=line
